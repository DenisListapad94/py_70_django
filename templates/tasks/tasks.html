{% extends "base.html" %}

{% block content %}

<style>
.table-emerald thead {
    background-color: #10b981;
    color: white;
}

.table-emerald tbody tr:hover {
    background-color: #d1fae5;
}

.table-emerald td:hover,
.table-emerald th:hover {
    background-color: #6ee7b7;
}

.table-emerald td,
.table-emerald th {
    transition: background-color 0.2s;
}
</style>

<div class="container mt-4" style="max-width: 1000px;">

<table class="table table-bordered table-striped text-center table-emerald">
  <thead>
    <tr>
      <th scope="col">name</th>
      <th scope="col">population</th>
      <th scope="col">country</th>
    </tr>
  </thead>

  <tbody>
  {% for city in cities %}
    <tr>
      <td>{{ city.name }}</td>
      <td>{{ city.population }}</td>
      <td>{{ city.country }}</td>
    </tr>
  {% endfor %}
  </tbody>

</table>

</div>

{% endblock %}
